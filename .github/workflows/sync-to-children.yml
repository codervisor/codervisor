name: Sync shared config to child repos

on:
  push:
    branches: [main]
    paths:
      - CLAUDE.md
      - CONTRIBUTING.md
      - templates/workflows/**
      - hooks/**

permissions:
  contents: read

jobs:
  sync:
    name: Open PRs in child repos
    runs-on: ubuntu-latest
    strategy:
      matrix:
        repo:
          - stiglab
          - synodic
          - telegramable
          - ising
          - skills
          - lean-spec
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Determine which files to sync
        id: files
        run: |
          # Build a list of shared files that exist in this repo
          FILES=""
          for f in CLAUDE.md CONTRIBUTING.md; do
            [ -f "$f" ] && FILES="$FILES $f"
          done
          echo "shared=$FILES" >> "$GITHUB_OUTPUT"

      - name: Sync to ${{ matrix.repo }}
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7
        env:
          TARGET_REPO: ${{ matrix.repo }}
        with:
          github-token: ${{ secrets.CODERVISOR_SYNC_PAT }}
          script: |
            const fs = require('fs');
            const repo = process.env.TARGET_REPO;
            const owner = 'codervisor';
            const branch = `chore/sync-shared-config-${context.sha.slice(0, 7)}`;
            const filesToSync = ['CLAUDE.md', 'CONTRIBUTING.md'];

            // Get default branch
            const { data: repoData } = await github.rest.repos.get({ owner, repo });
            const defaultBranch = repoData.default_branch;

            // Get latest commit SHA on default branch
            const { data: ref } = await github.rest.git.getRef({
              owner, repo, ref: `heads/${defaultBranch}`
            });
            const baseSha = ref.object.sha;

            // Create branch
            try {
              await github.rest.git.createRef({
                owner, repo,
                ref: `refs/heads/${branch}`,
                sha: baseSha
              });
            } catch (e) {
              if (e.status === 422) {
                core.info(`Branch ${branch} already exists — skipping ${repo}`);
                return;
              }
              throw e;
            }

            // Push each file
            for (const file of filesToSync) {
              if (!fs.existsSync(file)) continue;
              const content = fs.readFileSync(file, 'utf8');
              const contentBase64 = Buffer.from(content).toString('base64');

              // Check if file exists in target repo
              let existingSha;
              try {
                const { data } = await github.rest.repos.getContent({
                  owner, repo, path: file, ref: defaultBranch
                });
                existingSha = data.sha;
              } catch (e) {
                if (e.status !== 404) throw e;
              }

              await github.rest.repos.createOrUpdateFileContents({
                owner, repo, path: file, branch,
                message: `chore: sync ${file} from meta-repo`,
                content: contentBase64,
                ...(existingSha && { sha: existingSha })
              });
            }

            // Create PR
            await github.rest.pulls.create({
              owner, repo,
              title: 'chore: sync shared config from meta-repo',
              head: branch,
              base: defaultBranch,
              body: [
                '## Summary',
                '',
                'Automated sync of shared configuration from [codervisor/codervisor](https://github.com/codervisor/codervisor).',
                '',
                `Triggered by commit ${context.sha.slice(0, 7)} on \`main\`.`,
                '',
                '### Files synced',
                ...filesToSync.filter(f => fs.existsSync(f)).map(f => `- \`${f}\``),
                '',
                '## Test plan',
                '',
                '- [ ] Review diff for any repo-specific overrides that should be preserved',
                '- [ ] CI passes',
              ].join('\n')
            });

            core.info(`PR created in ${owner}/${repo}`);
